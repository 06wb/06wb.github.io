  <title>字体资源 for 新世纪五笔字型</title>
 </head>
 <body>
  一般用户：系统自带字体即可满足需求，无需安装字体。<br />
  <br />
  《通用规范汉字表》字集用户：不是最新版Windows 10操作系统的，需要安装“思源黑体”。<br />
  安装方法：下载<a href="SourceHanSansHWSC.zip">思源黑体</a>，解压后将两个otf文件放入<code>C:\WINDOWS\Fonts\</code>。<br />
  <br />
  超大字符集用户：需要安装“中华书局宋体”。<br />
  安装方法：下载<a href="ZhongHuaSong.zip">中华书局宋体</a>，解压后将两个ttf文件放入<code>C:\WINDOWS\Fonts\</code>，并双击SurrogateFallback.reg导入注册表。<br />
  <br />
  拆分提示用户：需要安装“五笔字根字体”。<br />
  安装方法：下载<a href="五笔字根字体2.0.ttf">五笔字根字体2.0</a>，放入<code>C:\WINDOWS\Fonts\</code>。<br />
  <br />
</body>
